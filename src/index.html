<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trello Clone</title>
</head>
<body>

  <div class="board" id="board">
    <div class="column" data-id="todo">
      <div class="column-header">Todo</div>
      <div class="cards-container"></div>
      <div class="add-card-wrapper">
        <button class="add-card-btn">+ Add another card</button>
        <div class="add-card-form hidden">
          <textarea class="card-textarea" placeholder="Enter a title for this card..."></textarea>
          <div class="form-actions">
            <button class="save-card-btn">Add card</button>
            <button class="cancel-card-btn">✕</button>
          </div>
        </div>
      </div>
    </div>

    <div class="column" data-id="in-progress">
      <div class="column-header">In Progress</div>
      <div class="cards-container"></div>
      <div class="add-card-wrapper">
        <button class="add-card-btn">+ Add another card</button>
        <div class="add-card-form hidden">
          <textarea class="card-textarea" placeholder="Enter a title for this card..."></textarea>
          <div class="form-actions">
            <button class="save-card-btn">Add card</button>
            <button class="cancel-card-btn">✕</button>
          </div>
        </div>
      </div>
    </div>

    <div class="column" data-id="done">
      <div class="column-header">Done</div>
      <div class="cards-container"></div>
      <div class="add-card-wrapper">
        <button class="add-card-btn">+ Add another card</button>
        <div class="add-card-form hidden">
          <textarea class="card-textarea" placeholder="Enter a title for this card..."></textarea>
          <div class="form-actions">
            <button class="save-card-btn">Add card</button>
            <button class="cancel-card-btn">✕</button>
          </div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
